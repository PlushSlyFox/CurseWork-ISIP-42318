<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БГП - Восстановление пароля</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="container">
            <div class="form-container">
                <h1><i class="fas fa-key"></i> ВОССТАНОВЛЕНИЕ ПАРОЛЯ</h1>
                
                <div id="alertMessage" class="alert" style="display: none;"></div>

                <div id="step1">
                    <form id="forgotForm">
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" id="resetEmail" placeholder="ivan@mail.ru" required>
                            <small>Введите email, указанный при регистрации</small>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block">
                            <i class="fas fa-paper-plane"></i> ПРОДОЛЖИТЬ
                        </button>
                    </form>
                </div>

                <div id="step2" style="display: none;">
                    <div class="reset-info" style="background: rgba(255,215,0,0.1); border-radius: 10px; padding: 15px; margin-bottom: 20px;">
                        <i class="fas fa-info-circle"></i>
                        <p>Введите новый пароль для аккаунта <strong id="userEmail"></strong></p>
                    </div>
                    
                    <form id="resetForm">
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Новый пароль</label>
                            <input type="password" id="newPassword" placeholder="Минимум 6 символов" required>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Подтвердите пароль</label>
                            <input type="password" id="confirmNewPassword" placeholder="Введите пароль еще раз" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block">
                            <i class="fas fa-save"></i> СОХРАНИТЬ ПАРОЛЬ
                        </button>
                    </form>
                </div>

                <div class="form-footer">
                    <a href="login.html"><i class="fas fa-arrow-left"></i> Вернуться ко входу</a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        let resetEmail = '';

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            resetEmail = document.getElementById('resetEmail').value.trim();
            
            if (!resetEmail) {
                showAlert('Введите email', 'error');
                return;
            }
            
            const user = await db.getUserByEmail(resetEmail);
            if (!user) {
                showAlert('Пользователь с таким email не найден', 'error');
                return;
            }
            
            document.getElementById('userEmail').textContent = resetEmail;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            showAlert('Введите новый пароль', 'success');
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;
            
            if (newPassword !== confirmPassword) {
                showAlert('Пароли не совпадают', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showAlert('Пароль должен быть не менее 6 символов', 'error');
                return;
            }
            
            try {
                await auth.resetPassword(resetEmail, newPassword);
                showAlert('Пароль успешно изменен!', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });
    </script>
</body>
</html>
